<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#e7f6fa">
  <title>CareGuide — Offline</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:1rem;background:linear-gradient(145deg,#effafd,#d8f0f5);font:16px/1.6 system-ui,sans-serif;color:#173b4d}.card{width:min(100%,520px);padding:2rem;border:1px solid #86bdca;border-radius:18px;background:#fffffff0;box-shadow:0 16px 45px #194c6026}.mark{font-size:2rem;color:#168ca2}h1{margin:.4rem 0;font-size:clamp(1.8rem,8vw,2.7rem);color:#124d66}button{min-height:46px;padding:.7rem 1rem;border:0;border-radius:9px;background:#147f99;color:#fff;font-weight:700;font-size:1rem}</style>
</head>
<body>
  <main class="card">
    <div class="mark" aria-hidden="true">✚</div>
    <h1>You are offline</h1>
    <p>CareGuide cannot start a new consultation without the local Prolog server. Reconnect to the server, then try again.</p>
    <button type="button" onclick="location.reload()">Try again</button>
  </main>
</body>
</html>
